name: Release

# 仅 Git tag 推送触发（不再在 develop 分支 push 时构建 edge / 发版）
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  dockerize:
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, BOT_PAT,
      #   ALIYUN_ACR_REGISTRY（如 registry.cn-hangzhou.aliyuncs.com）、ALIYUN_ACR_NAMESPACE（ACR 命名空间）、
      #   ALIYUN_ACR_USERNAME、ALIYUN_ACR_PASSWORD — 均在 Infisical /logto，key 与 env 名一致
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: prod
          secret-path: /logto

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/rexqin/logto
            dolphinux/logto
            ${{ env.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_ACR_NAMESPACE }}/logto
          # https://github.com/docker/metadata-action#typesemver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge
            # 非 semver 的 Git tag（如 latest）仍能生成镜像 tag
            type=ref,event=tag

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: silverhand-bot
          password: ${{ env.BOT_PAT }}

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ env.ALIYUN_ACR_USERNAME }}
          password: ${{ env.ALIYUN_ACR_PASSWORD }}

      # Depot project 属上游组织，fork 无权限；改用 Buildx + QEMU 构建多架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 镜像推送至仓库后，再按 deploy-ecs-compose 流程同步 compose/.env 并在 ECS 上 pull/up
  deploy-ecs:
    needs: dockerize
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/deploy-ecs-compose.yml
    secrets: inherit

  # Build and push the edge image on branch push (develop is not repo default → type=edge alone yields no tags)
  dockerize-edge:
    if: ${{ !startsWith(github.ref, 'refs/tags/')}}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: prod
          secret-path: /logto

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/rexqin/logto
            dolphinux/logto
            ${{ env.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_ACR_NAMESPACE }}/logto
          # develop 非默认分支时 type=edge 常无输出；raw 保证始终有 tag 可 push
          tags: |
            type=raw,value=edge

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: |
            ghcr.io
          username: silverhand-bot
          password: ${{ env.BOT_PAT }}

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ env.ALIYUN_ACR_USERNAME }}
          password: ${{ env.ALIYUN_ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Publish packages and create git tags if needed
  publish-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: prod
          secret-path: /logto

      - uses: actions/checkout@v4
        with:
          # Set Git operations with the bot PAT since we have tag protection rule
          token: ${{ env.BOT_PAT }}
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      # 无 TTY 的 CI 里默认 pinentry 会报 Inappropriate ioctl for device；必须在导入密钥前启用 loopback
      - name: Prepare GPG for headless signing
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          touch ~/.gnupg/gpg.conf ~/.gnupg/gpg-agent.conf
          grep -q '^use-agent' ~/.gnupg/gpg.conf || echo 'use-agent' >> ~/.gnupg/gpg.conf
          grep -q '^pinentry-mode loopback' ~/.gnupg/gpg.conf || echo 'pinentry-mode loopback' >> ~/.gnupg/gpg.conf
          grep -q '^allow-loopback-pinentry' ~/.gnupg/gpg-agent.conf || echo 'allow-loopback-pinentry' >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent 2>/dev/null || true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.BOT_GPG_KEY }}
          passphrase: ${{ env.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Configure Git user
        run: |
          git config --global gpg.program "$(command -v gpg)"
          git config --global user.email 40061167@qq.com
          git config --global user.name rexqin

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_AUTOMATION_TOKEN }}
        run: node .scripts/publish.js

  create-github-release:
    environment: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: prod
          secret-path: /logto

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Build
        run: pnpm -r build

      - name: Package
        run: ./.scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.BOT_PAT }}
          body: ""
          files: /tmp/logto.tar.gz
          append_body: true
