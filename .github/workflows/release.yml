name: Release

# 仅 Git tag 推送触发（不再在 develop 分支 push 时构建 edge / 发版）
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  dockerize:
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, BOT_PAT,
      #   ALIYUN_ACR_REGISTRY（如 registry.cn-hangzhou.aliyuncs.com）、ALIYUN_ACR_NAMESPACE（ACR 命名空间）、
      #   ALIYUN_ACR_USERNAME、ALIYUN_ACR_PASSWORD — 均在 Infisical /logto，key 与 env 名一致
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: prod
          secret-path: /logto

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_ACR_NAMESPACE }}/logto
          # https://github.com/docker/metadata-action#typesemver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge
            # 非 semver 的 Git tag（如 latest）仍能生成镜像 tag
            type=ref,event=tag

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ env.ALIYUN_ACR_USERNAME }}
          password: ${{ env.ALIYUN_ACR_PASSWORD }}

      # Depot project 属上游组织，fork 无权限；改用 Buildx + QEMU 构建多架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 镜像推送且 publish 完成后，再按 deploy-ecs-compose 同步 compose/.env 并在 ECS 上 pull/up
  deploy-ecs:
    needs: [dockerize]
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/deploy-ecs-compose.yml
    secrets: inherit
