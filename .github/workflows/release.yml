name: Release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  dockerize:
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, BOT_PAT under /logto in Infisical (keys must match env names)
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: dev
          secret-path: /logto

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/rexqin/logto
            dolphinux/logto
          # https://github.com/docker/metadata-action#typesemver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge
            # 非 semver 的 Git tag（如 latest）仍能生成镜像 tag
            type=ref,event=tag

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: silverhand-bot
          password: ${{ env.BOT_PAT }}

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Build and push
        uses: depot/build-push-action@v1
        with:
          platforms: linux/amd64, linux/arm64
          project: g902cp6dvv
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Build and push the edge image on branch push (develop is not repo default → type=edge alone yields no tags)
  dockerize-edge:
    if: ${{ !startsWith(github.ref, 'refs/tags/')}}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: dev
          secret-path: /logto

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/rexqin/logto
            dolphinux/logto
          # develop 非默认分支时 type=edge 常无输出；raw 保证始终有 tag 可 push
          tags: |
            type=raw,value=edge

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: |
            ghcr.io
          username: silverhand-bot
          password: ${{ env.BOT_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Publish packages and create git tags if needed
  publish-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: dev
          secret-path: /logto

      - uses: actions/checkout@v4
        with:
          # Set Git operations with the bot PAT since we have tag protection rule
          token: ${{ env.BOT_PAT }}
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.BOT_GPG_KEY }}
          passphrase: ${{ env.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Configure Git user
        run: |
          git config --global user.email 40061167@qq.com
          git config --global user.name rexqin

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_AUTOMATION_TOKEN }}
        run: node .scripts/publish.js

  create-github-release:
    environment: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: 436a2630-fad8-475b-8f00-5ab158e9919e
          project-slug: project-nd-zj
          env-slug: dev
          secret-path: /logto

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Build
        run: pnpm -r build

      - name: Package
        run: ./.scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.BOT_PAT }}
          body: ""
          files: /tmp/logto.tar.gz
          append_body: true
