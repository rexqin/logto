# 在阿里云 ECS 上通过 SSH 使用本仓库的 docker-compose.yml 部署 Logto。
# 前置：ECS 已安装 Docker 与 Compose 插件；安全组放行来自 GitHub Actions  runner 的 SSH（或使用 self-hosted runner / 堡垒机）。
#
# GitHub Environment「prod」中建议配置：
#   INFISICAL_IDENTITY_ID — Secret（Infisical OIDC Machine Identity ID）
#   INFISICAL_PROJECT_SLUG — Variable（如 project-nd-zj）
# Infisical（示例路径 /ecs，可在下方改成 /logto 等与现有路径一致）建议存放：
#   ECS_HOST          — ECS 公网 IP 或域名
#   ECS_USER          — SSH 用户（如 root、ecs-user）
#   ECS_SSH_PRIVATE_KEY — 私钥全文（含 BEGIN/END，Infisical 多行文本）
#   ECS_SSH_PORT      — 可选，默认 22
#   ECS_DEPLOY_PATH   — 可选，远程目录，默认 ~/logto
#   TAG               — 可选，镜像 tag，默认 latest（与 compose 中 svhd/logto:${TAG:-latest} 对应）
#   DB_URL            — 生产库连接串（勿用 host.docker.internal；可用 RDS 内网或宿主机 IP）
#   POSTGRES_USER     — 可选，compose 内变量
#   POSTGRES_PASSWORD — 可选
#   POSTGRES_DB       — 可选
#   ENDPOINT          — Logto 对外端点
#   ADMIN_ENDPOINT    — 管理控制台端点
# 若镜像仓库与 compose 中 svhd/logto 不一致，可在 Infisical 增加 LOGTO_IMAGE，工作流会生成 compose.override.yml 覆盖 image。

name: Deploy ECS (Logto)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 检出仓库 ref（用于取 docker-compose.yml）
        required: false
        default: master
  # 供 release.yml 等在工作流中复用：镜像构建推送后再部署 ECS
  workflow_call:
    inputs:
      git_ref:
        description: 检出仓库 ref（默认使用触发方 workflow 的 github.ref）
        type: string
        required: false
        default: ""

concurrency:
  group: deploy-ecs-compose
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch：用输入的 git_ref；workflow_call / push：inputs 为空时用 github.ref（与调用方一致）
          ref: ${{ inputs.git_ref || github.ref }}
          fetch-depth: 1

      - name: Fetch secrets from Infisical for deploy
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /logto/ci

      - name: Fetch secrets from Infisical for release
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          export-type: file
          secret-path: /logto

      - name: Normalize .env quotes
        run: |
          python - <<'PY'
          from pathlib import Path

          env_file = Path(".env")
          env_file.write_text(env_file.read_text(encoding="utf-8").replace("'", '"'), encoding="utf-8")
          PY

      - name: Validate required secrets
        run: |
          test -n "${ECS_HOST:-}" || { echo "::error::Infisical 缺少 ECS_HOST"; exit 1; }
          test -n "${ECS_USER:-}" || { echo "::error::Infisical 缺少 ECS_USER"; exit 1; }
          test -n "${ECS_SSH_PRIVATE_KEY:-}" || { echo "::error::Infisical 缺少 ECS_SSH_PRIVATE_KEY"; exit 1; }

      - name: Ensure remote directory
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          port: ${{ env.ECS_SSH_PORT || '22' }}
          script: |
            mkdir -p ${{ env.ECS_DEPLOY_PATH || '~/logto' }}

      - name: SCP docker-compose.yml and .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          port: ${{ env.ECS_SSH_PORT || '22' }}
          source: "docker-compose.yml,.env"
          target: ${{ env.ECS_DEPLOY_PATH || '~/logto' }}

      # 先 down 再 pull/up：避免同名 compose 项目已有容器时仅 up 导致旧容器/网络残留或端口冲突
      - name: Docker compose down, pull and up
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          port: ${{ env.ECS_SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ env.ECS_DEPLOY_PATH || '~/logto' }}
            docker compose --env-file .env down
            docker compose --env-file .env pull
            docker compose --env-file .env up --pull always -d --remove-orphans
            docker image prune -f
