# This compose file is for demonstration only, do not use in prod.
services:
  logto:
    image: registry.cn-hangzhou.aliyuncs.com/rexqin/logto:${TAG-latest}
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    ports:
      - 3001:3001
      - 3002:3002
    # Optional (GitPod / local): set via environment mapping, e.g. PORT=3001, ADMIN_PORT=3002
    env_file:
      - .env
    networks:
      - ibb8-net

networks:
  ibb8-net:
    external: true
    name: ibb8-net